version: "2"

linters:
  default: none
  enable:
    # this list was extracted from other popular projects
    - asciicheck # checks that your code does not contain non-ASCII identifiers
    - bodyclose # checks whether HTTP response body is closed successfully
    - copyloopvar # detects places where loop variables are copied (Go 1.22+)
    - durationcheck # checks for two durations multiplied together
    - exhaustive # checks exhaustiveness of enum-like switch statements
    - forbidigo # forbids direct prints that bypass ux/lipgloss
    - goconst # finds repeated strings that could be constants
    - gomoddirectives # manages 'replace', 'retract', and 'excludes' in go.mod
    - goprintffuncname # checks that printf-like functions are named with f at the end
    - gosec # inspects code for common security problems
    - misspell # finds commonly misspelled English words
    - modernize # use modern language and lib features.
    - nakedret # checks for naked returns in long functions
    - nestif # reports deeply nested if statements
    - nilerr # finds the code that returns nil even if it checks that the error is not nil
    - nolintlint # reports ill-formed or insufficient nolint directives
    - prealloc # suggests preallocating slices when safe
    - revive # configurable general-purpose style and correctness linter
    - rowserrcheck # checks that sql.Rows.Err is checked
    - sqlclosecheck # checks that sql.Rows and statements are closed
    - tparallel # checks top-level tests and subtests for proper parallel usage
    - unconvert # removes unnecessary type conversions
    - unparam # reports unused function parameters
    - whitespace # detects unnecessary leading/trailing blank lines

  exclusions:
    generated: lax
    presets: [comments, common-false-positives, std-error-handling]
    rules:
      - path: '(gmv/player\.go|util/util\.go)$'
        linters: [forbidigo]

  settings:
    exhaustive:
      default-signifies-exhaustive: true # default switch works even if some enums not present
    forbidigo:
      forbid:
        - pattern: ^fmt\.(Print(f|ln)?|Fprint(f|ln)?)$
          msg: use ux/lipgloss output helpers for terminal output
      analyze-types: true
    gosec:
      {
        confidence: low,
        severity: low,
        excludes: [G101, G104, G115, G117, G301],
      }

issues: { max-issues-per-linter: 0, max-same-issues: 0 }
formatters:
  enable: [gofumpt, goimports]
  exclusions: { generated: lax }
run: { tests: false } # don't run on test files
