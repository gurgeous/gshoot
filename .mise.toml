[env]
_.path = ["{{config_root}}/tmp/bin"]

[settings]
task.output = "quiet"

[shell_alias]
gshoot = "go run ./cmd/gshoot"

[tools]
golang = "latest"
golangci-lint = "latest"

#
# tasks
#

[tasks]

# one-liners
build = "mkdir -p tmp/bin && go build -o tmp/bin/gshoot ./cmd/gshoot"
build-smoke = "mkdir -p tmp/bin && go build -o tmp/bin/smoke ./cmd/smoke"
check = "mise lint ::: test ::: build && mise _banner -- '✓ check ✓'"
ci = "mise check"
format = "go mod tidy && golangci-lint fmt && mise _banner '✓ format ✓'"
lint = "golangci-lint run && mise _banner '✓ lint ✓'"
test = "go test ./... && mise _banner '✓ test ✓'"

smoke = """
mise build ::: build-smoke
./tmp/bin/smoke
mise _banner "✓ smoke ✓"
"""

#
# banner and friends
#

[tasks._banner]
usage = 'flag "--bg <bg>" default="48;2;64;160;43" ; arg "<msg>"'
run = 'printf "\e[1;38;5;231;%sm[%s] %-72s\e[0m\n" "${usage_bg}" $(date +"%H:%M:%S") "${usage_msg}"'

[tasks._warning]
usage = 'arg "<msg>"'
run = 'mise _banner --bg "48;2;251;100;11" "$usage_msg"'

[tasks._fatal]
usage = 'arg "<msg>"'
run = 'mise _banner --bg "48;2;210;15;57" "$usage_msg" ; exit 1'
