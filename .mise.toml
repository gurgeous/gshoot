[tasks]
fmt = "gofmt -w $(find cmd internal -name '*.go')"
lint = "golangci-lint run ./..."
test = "go test ./..."
build = "go build ./..."

[tasks.smoke]
run = [
  "mkdir -p tmp",
  "go build -o tmp/gshoot ./cmd/gshoot",
  "go run ./cmd/smoke --gshoot tmp/gshoot"
]

[tasks.check]
depends = ["lint", "test", "build"]
